<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>USAM Fund</title>
    <!--
      SPA fallback for GitHub Pages. Pages serves this file for any unknown
      path (e.g. a refreshed/deep-linked /usam/apply). It encodes the path into
      a query string and redirects to the app root, where the snippet in
      index.html decodes it back so React Router can render the right route.
      pathSegmentsToKeep = 1 keeps the "/usam/" project base. Set to 0 for a
      root/custom-domain deploy.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
