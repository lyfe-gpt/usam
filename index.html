<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SPA redirect decode: pairs with public/404.html so deep links restored
         from the GitHub Pages 404 fallback land on the correct route. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <!-- PRE-LAUNCH: blocks all search-engine indexing. REMOVE these two robots
         meta tags (and flip robots.txt) when ready to publish publicly. -->
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <title>USAM Fund | Hard Money, Soft Terms</title>
    <meta
      name="description"
      content="USAM Fund is a direct private and hard-money lender for real estate investors, operators, and developers nationwide. Fast closings, flexible structure."
    />
    <!-- Open Graph / Twitter defaults (PageMeta updates these per route at runtime) -->
    <link rel="canonical" href="https://usam.net/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="USAM Fund" />
    <meta property="og:title" content="USAM Fund | Hard Money, Soft Terms" />
    <meta property="og:description" content="Direct private and hard-money lending for real estate investors, operators, and developers nationwide. Fast closings, flexible structure." />
    <meta property="og:url" content="https://usam.net/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://usam.net/og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="USAM Fund - Hard Money, Soft Terms" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="USAM Fund | Hard Money, Soft Terms" />
    <meta name="twitter:description" content="Direct private and hard-money lending for real estate investors, operators, and developers nationwide." />
    <meta name="twitter:image" content="https://usam.net/og.jpg" />
    <meta name="twitter:image:alt" content="USAM Fund - Hard Money, Soft Terms" />
    <!-- Favicons (flag emblem from the USAM logo) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0E1A2B" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
