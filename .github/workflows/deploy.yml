name: Deploy (Amplify)

# Builds the SPA and deploys it to AWS Amplify on push to main.
#
# Gated by the repo variable AUTO_DEPLOY: until it is set to 'true' the job is
# SKIPPED (shown grey, not red), so pushing code doesn't deploy until the AWS side
# is wired up and you choose to flip it on:  gh variable set AUTO_DEPLOY --body true
#
# Auth is OIDC — no long-lived AWS keys are stored in GitHub. The role ARN comes
# from the repo variable AWS_DEPLOY_ROLE_ARN (created by deploy/setup-github-oidc.sh).
#
# The Airtable token is NOT here — it lives on the usam-forms Lambda. The only build
# config is VITE_API_URL (public API Gateway URL) from the repo variable of the same name.
#
# (This replaced the old GitHub Pages workflow; the site is hosted on Amplify now.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required to request the OIDC token
  contents: read

jobs:
  deploy:
    if: ${{ vars.AUTO_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # base defaults to "/" (Amplify root). VITE_API_URL tells the forms where
          # to POST; it's a public URL, set as a repo variable.
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          # GA4 measurement ID (public). Loaded consent-gated by src/lib/analytics.js.
          VITE_GA4_ID: ${{ vars.VITE_GA4_ID }}

      - name: Deploy to Amplify
        run: bash deploy/deploy-amplify.sh
        env:
          AMPLIFY_APP_ID: d26k7ln1hnf44p
          AMPLIFY_BRANCH: main
