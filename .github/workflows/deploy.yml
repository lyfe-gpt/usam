name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Auto-enables GitHub Pages (source = Actions) on first run, so no manual
      # toggle in repo Settings is needed.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - run: npm run build
        env:
          # GitHub Pages serves this repo at the /usam/ subpath, so the build
          # needs base=/usam/. (AWS Amplify serves at root and omits this, so
          # it builds with base=/.)
          VITE_BASE: /usam/
          # Forms POST to the API Gateway + Lambda; the Airtable token lives
          # server-side on the Lambda, so it is no longer needed at build time.
          VITE_API_URL: https://gofe0jrl29.execute-api.us-east-1.amazonaws.com
      # SPA fallback: GitHub Pages serves 404.html for unknown deep links
      # (e.g. /usam/faq); reusing the app shell lets React Router handle them.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
